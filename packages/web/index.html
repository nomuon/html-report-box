<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>HTML Report Box</title>
    <script>
      // FOUC 防止: 明示テーマ選択（light/dark）があれば描画前に data-theme を付与する。
      // "system"（または未保存）は属性なし = CSS メディアクエリで OS 設定に追従。
      (function () {
        try {
          var t = localStorage.getItem("hrb-theme");
          if (t === "light" || t === "dark") {
            document.documentElement.setAttribute("data-theme", t);
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="./src/styles/theme.css" />
    <link rel="stylesheet" href="./src/styles/app.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
