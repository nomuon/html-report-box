<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2025年 第3四半期 営業ダッシュボード</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap">
  <style>
    body { font-family: "Noto Sans JP", system-ui, sans-serif; margin: 0; padding: 32px; background: #f7f8fa; color: #1a1a1a; }
    .kpis { display: flex; gap: 16px; flex-wrap: wrap; }
    .kpi { background: #fff; border: 1px solid #e3e6ea; border-radius: 10px; padding: 16px 20px; }
    .kpi b { display: block; font-size: 1.8rem; color: #2f6fb0; }
    table { border-collapse: collapse; margin-top: 24px; background: #fff; }
    th, td { border: 1px solid #e3e6ea; padding: 8px 14px; text-align: right; }
    th:first-child, td:first-child { text-align: left; }
  </style>
</head>
<body>
  <h1>2025年 第3四半期 営業ダッシュボード</h1>
  <p>各地域の売上実績と前年同期比をまとめています。</p>
  <div class="kpis">
    <div class="kpi"><b>¥4.2億</b>総売上</div>
    <div class="kpi"><b>112%</b>前年比</div>
    <div class="kpi"><b>328件</b>新規契約</div>
  </div>
  <table>
    <thead><tr><th>地域</th><th>売上</th><th>前年比</th></tr></thead>
    <tbody>
      <tr><td>東日本</td><td>¥1.8億</td><td>108%</td></tr>
      <tr><td>西日本</td><td>¥1.5億</td><td>115%</td></tr>
      <tr><td>海外</td><td>¥0.9億</td><td>121%</td></tr>
    </tbody>
  </table>
</body>
</html>
